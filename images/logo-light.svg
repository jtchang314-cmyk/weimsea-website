<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 714.0 220" width="714.0" height="220">
    <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#1B4F72"/>
        <stop offset="100%" style="stop-color:#2E86C1"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#1A2B4A"/>
        <stop offset="50%" style="stop-color:#1A2B4A"/>
        <stop offset="100%" style="stop-color:#2E86C1"/>
    </linearGradient>
</defs>
    
    <g transform="translate(90.0, 110.0)">
        <!-- 圆角菱形符号，居中 -->
        <g transform="rotate(45, 80.0, 80.0)">
        <!-- 圆角菱形外框，深蓝边框 -->
        <rect 
            x="4.8" 
            y="4.8" 
            width="150.4" 
            height="150.4" 
            rx="19.2" 
            ry="19.2"
            fill="none" 
            stroke="#1A2B4A" 
            stroke-width="4.8"
        />
        
        <!-- 内部几何：左侧一个渐变矩形 -->
        <rect 
            x="28.799999999999997" 
            y="44.800000000000004" 
            width="83.2" 
            height="60.8" 
            fill="url(#blueGradient)"
        />
        
        <!-- 内部几何：右侧两个平行渐变短矩形 -->
        <rect 
            x="92.8" 
            y="28.799999999999997" 
            width="24.0" 
            height="51.2" 
            fill="url(#blueGradient)"
        />
        <rect 
            x="92.8" 
            y="80.0" 
            width="24.0" 
            height="51.2" 
            fill="url(#blueGradient)"
        />
    </g>
    </g>
    
    <!-- 文字区域：横向左对齐 -->
    <g transform="translate(210, 90.0)">
        <!-- 中文：未名锡 -->
        <text 
        x="0" 
        y="56" 
        font-family="'PingFang SC', 'Microsoft YaHei', 'Heiti SC', sans-serif" 
        font-size="56px" 
        font-weight="500"
        fill="#1A2B4A"
        letter-spacing="8px"
    >未名锡</text>
        
        <!-- 英文：WeimSea -->
        <text 
            x="0" 
            y="66" 
            font-family="'Montserrat', 'Arial', sans-serif" 
            font-size="36px" 
            font-weight="600"
            fill="url(#textGradient)"
            letter-spacing="3px"
        >WeimSea</text>
    </g>
</svg>